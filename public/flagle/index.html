<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flagle</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --text:#f0f0f0;--text2:#8b8fa8;--accent:#4f7fff;
  --green:#22c55e;--red:#ef4444;--border:#2e3248;--radius:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;}
header{text-align:center;margin-bottom:1.5rem;}
header h1{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;letter-spacing:-1px;}
header h1 span{color:var(--accent);}
header p{color:var(--text2);font-size:0.85rem;margin-top:0.3rem;}

/* FLAG DISPLAY */
.flag-wrap{
  width:360px;height:240px;
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
  gap:3px;border-radius:12px;overflow:hidden;
  border:2px solid var(--border);margin-bottom:1.5rem;
  background:var(--border);
}
.flag-cell{
  position:relative;overflow:hidden;
  background:#1a1d27;
}
.flag-cell canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;
}
.flag-cell .overlay{
  position:absolute;inset:0;
  background:#1a1d27;
  transition:opacity 0.5s ease;
}
.flag-cell.revealed .overlay{opacity:0;}

/* ATTEMPTS */
.attempts{display:flex;gap:0.5rem;margin-bottom:1.5rem;}
.dot{width:13px;height:13px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);transition:background 0.3s;}
.dot.wrong{background:var(--red);border-color:var(--red);}
.dot.correct{background:var(--green);border-color:var(--green);}

/* INPUT */
.input-wrap{width:100%;max-width:380px;position:relative;margin-bottom:0.8rem;}
.guess-input{width:100%;padding:0.85rem 1.1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color 0.2s;}
.guess-input:focus{border-color:var(--accent);}
.guess-input::placeholder{color:var(--text2);}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);max-height:200px;overflow-y:auto;z-index:100;display:none;}
.autocomplete.show{display:block;}
.ac-item{padding:0.65rem 1rem;cursor:pointer;font-size:0.92rem;display:flex;align-items:center;gap:0.5rem;transition:background 0.12s;}
.ac-item:hover{background:var(--surface2);}
.ac-item img{width:28px;height:18px;object-fit:cover;border-radius:3px;border:1px solid var(--border);}

.guess-btn{width:100%;max-width:380px;padding:0.85rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.15s;margin-bottom:0.6rem;}
.guess-btn:hover{background:#3d6be8;}
.skip-btn{background:none;border:none;color:var(--text2);font-size:0.82rem;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif;margin-bottom:1rem;}

/* GUESS LIST */
.guess-list{width:100%;max-width:380px;display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.guess-row{display:flex;align-items:center;gap:0.6rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.6rem 0.9rem;animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.guess-row img{width:32px;height:21px;object-fit:cover;border-radius:3px;border:1px solid var(--border);}
.guess-row .gname{flex:1;font-size:0.88rem;}
.guess-row .cells-preview{display:flex;gap:2px;}
.cell-dot{width:14px;height:14px;border-radius:3px;}

/* RESULT */
.result{width:100%;max-width:380px;padding:1.2rem;border-radius:var(--radius);text-align:center;margin-bottom:1rem;animation:pop 0.3s ease;}
@keyframes pop{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
.result.win{background:rgba(34,197,94,0.15);border:1.5px solid var(--green);}
.result.lose{background:rgba(239,68,68,0.15);border:1.5px solid var(--red);}
.result h2{font-family:'Syne',sans-serif;font-size:1.3rem;margin-bottom:0.4rem;}
.result p{font-size:0.88rem;color:var(--text2);}
.result img{width:80px;height:53px;object-fit:cover;border-radius:6px;margin:0.6rem auto;display:block;border:2px solid var(--border);}

.play-again{padding:0.7rem 1.8rem;background:var(--surface2);color:var(--text);border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;}
.play-again:hover{background:var(--border);}

.loading{color:var(--text2);font-size:0.9rem;padding:1rem;}
</style>
</head>
<body>
<header>
  <h1>Flag<span>le</span></h1>
  <p>Errate die Flagge – übereinstimmende Teile werden enthüllt!</p>
</header>

<div class="flag-wrap" id="flagWrap">
  <div class="flag-cell" id="c0"><canvas id="cv0"></canvas><div class="overlay"></div></div>
  <div class="flag-cell" id="c1"><canvas id="cv1"></canvas><div class="overlay"></div></div>
  <div class="flag-cell" id="c2"><canvas id="cv2"></canvas><div class="overlay"></div></div>
  <div class="flag-cell" id="c3"><canvas id="cv3"></canvas><div class="overlay"></div></div>
  <div class="flag-cell" id="c4"><canvas id="cv4"></canvas><div class="overlay"></div></div>
  <div class="flag-cell" id="c5"><canvas id="cv5"></canvas><div class="overlay"></div></div>
</div>

<div class="attempts" id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div><div class="dot" id="d4"></div><div class="dot" id="d5"></div>
</div>

<div class="input-wrap" id="inputWrap">
  <input class="guess-input" id="gInput" type="text" placeholder="Land eingeben…" autocomplete="off" oninput="onInput()" onkeydown="onKey(event)"/>
  <div class="autocomplete" id="ac"></div>
</div>
<button class="guess-btn" id="gBtn" onclick="submitGuess()">Raten</button>
<button class="skip-btn" id="sBtn" onclick="skipGuess()">Überspringen →</button>

<div class="guess-list" id="gList"></div>
<div class="result" id="result" style="display:none"></div>
<button class="play-again" id="paBtn" style="display:none" onclick="newGame()">Neues Spiel 🔄</button>

<script>
// Countries with ISO codes for flagcdn.com
const countries = [
  {name:"Deutschland",code:"de"},{name:"Frankreich",code:"fr"},{name:"Italien",code:"it"},
  {name:"Spanien",code:"es"},{name:"Portugal",code:"pt"},{name:"Niederlande",code:"nl"},
  {name:"Belgien",code:"be"},{name:"Schweiz",code:"ch"},{name:"Österreich",code:"at"},
  {name:"Polen",code:"pl"},{name:"Tschechien",code:"cz"},{name:"Ungarn",code:"hu"},
  {name:"Schweden",code:"se"},{name:"Norwegen",code:"no"},{name:"Dänemark",code:"dk"},
  {name:"Finnland",code:"fi"},{name:"Griechenland",code:"gr"},{name:"Türkei",code:"tr"},
  {name:"Ukraine",code:"ua"},{name:"USA",code:"us"},{name:"Kanada",code:"ca"},
  {name:"Mexiko",code:"mx"},{name:"Brasilien",code:"br"},{name:"Argentinien",code:"ar"},
  {name:"Chile",code:"cl"},{name:"Japan",code:"jp"},{name:"China",code:"cn"},
  {name:"Südkorea",code:"kr"},{name:"Indien",code:"in"},{name:"Australien",code:"au"},
  {name:"Neuseeland",code:"nz"},{name:"Südafrika",code:"za"},{name:"Ägypten",code:"eg"},
  {name:"Nigeria",code:"ng"},{name:"Marokko",code:"ma"},{name:"Saudi-Arabien",code:"sa"},
  {name:"Israel",code:"il"},{name:"Indonesien",code:"id"},{name:"Thailand",code:"th"},
  {name:"Vietnam",code:"vn"},{name:"Vereinigtes Königreich",code:"gb"},{name:"Irland",code:"ie"},
  {name:"Rumänien",code:"ro"},{name:"Kroatien",code:"hr"},{name:"Serbien",code:"rs"},
  {name:"Bulgarien",code:"bg"},{name:"Litauen",code:"lt"},{name:"Lettland",code:"lv"},
  {name:"Estland",code:"ee"},{name:"Peru",code:"pe"},{name:"Kuba",code:"cu"},
  {name:"Philippinen",code:"ph"},{name:"Malaysia",code:"my"},{name:"Singapur",code:"sg"},
  {name:"Bangladesch",code:"bd"},{name:"Nepal",code:"np"},{name:"Algerien",code:"dz"},
  {name:"Ghana",code:"gh"},{name:"Kenia",code:"ke"},{name:"Iran",code:"ir"},
  {name:"Pakistan",code:"pk"},{name:"Russland",code:"ru"},{name:"Kolumbien",code:"co"},
  {name:"Venezuela",code:"ve"},{name:"Uruguay",code:"uy"},{name:"Albanien",code:"al"},
  {name:"Slowakei",code:"sk"},{name:"Slowenien",code:"si"},{name:"Luxemburg",code:"lu"},
];

function flagUrl(code, w=160) {
  return `https://flagcdn.com/w${w}/${code}.png`;
}

// Load image as ImageData, crossOrigin
function loadImg(url) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => res(img);
    img.onerror = () => rej();
    img.src = url;
  });
}

// Get avg color of a region from ImageData
function avgColor(imgData, x, y, w, h, fullW) {
  let r=0,g=0,b=0,n=0;
  for(let row=y;row<y+h;row++){
    for(let col=x;col<x+w;col++){
      const i=(row*fullW+col)*4;
      r+=imgData[i];g+=imgData[i+1];b+=imgData[i+2];n++;
    }
  }
  return [r/n,g/n,b/n];
}

function colorDist(a,b){
  return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2);
}

// Draw flag image into a canvas cell
function drawFlagIntoCanvas(img, canvasEl) {
  const W = 120, H = 80;
  canvasEl.width = W; canvasEl.height = H;
  const ctx = canvasEl.getContext('2d');
  ctx.drawImage(img, 0, 0, W, H);
}

// Get colors per cell (2x3 grid) from img
function getCellColors(img) {
  const W=120, H=80, cols=3, rows=2;
  const cw=W/cols, ch=H/rows;
  const off = document.createElement('canvas');
  off.width=W; off.height=H;
  const ctx=off.getContext('2d');
  ctx.drawImage(img,0,0,W,H);
  const data=ctx.getImageData(0,0,W,H).data;
  const colors=[];
  for(let row=0;row<rows;row++){
    for(let col=0;col<cols;col++){
      colors.push(avgColor(data, col*cw, row*ch, cw, ch, W));
    }
  }
  return colors;
}

let answer, answerImg, answerColors, guesses, gameOver;

async function newGame() {
  gameOver=false; guesses=[];
  answer = countries[Math.floor(Math.random()*countries.length)];

  // Reset UI
  for(let i=0;i<6;i++){
    document.getElementById('d'+i).className='dot';
    document.getElementById('c'+i).classList.remove('revealed');
  }
  document.getElementById('gList').innerHTML='';
  document.getElementById('result').style.display='none';
  document.getElementById('paBtn').style.display='none';
  document.getElementById('inputWrap').style.display='block';
  document.getElementById('gBtn').style.display='block';
  document.getElementById('sBtn').style.display='block';
  document.getElementById('gInput').value='';
  document.getElementById('ac').classList.remove('show');

  // Load answer flag
  try {
    answerImg = await loadImg(flagUrl(answer.code));
    answerColors = getCellColors(answerImg);
    // Draw answer flag into all cells
    for(let i=0;i<6;i++){
      drawFlagIntoCanvas(answerImg, document.getElementById('cv'+i));
    }
  } catch(e) {
    // fallback: try again with different country
    newGame();
  }
}

async function submitGuess(skip) {
  if(gameOver) return;
  const input = document.getElementById('gInput');
  const val = skip ? null : input.value.trim();
  const attempt = guesses.length;
  if(!skip && !val) return;

  const match = skip ? null : countries.find(c => c.name.toLowerCase()===val.toLowerCase());
  const correct = !skip && match && match.code === answer.code;

  document.getElementById('d'+attempt).className = 'dot '+(correct?'correct':'wrong');

  // Build guess row
  const row = document.createElement('div');
  row.className = 'guess-row';

  let cellDots = '';
  let matchedCells = [];

  if(!skip && match) {
    try {
      const guessImg = await loadImg(flagUrl(match.code));
      const guessColors = getCellColors(guessImg);
      // Compare each cell
      for(let i=0;i<6;i++){
        const dist = colorDist(guessColors[i], answerColors[i]);
        const matched = dist < 55; // threshold
        matchedCells.push(matched);
        if(matched) {
          document.getElementById('c'+i).classList.add('revealed');
          cellDots += `<div class="cell-dot" style="background:var(--green)"></div>`;
        } else {
          cellDots += `<div class="cell-dot" style="background:var(--red)"></div>`;
        }
      }
      row.innerHTML = `
        <img src="${flagUrl(match.code,80)}" alt="${match.name}"/>
        <span class="gname">${match.name}</span>
        <div class="cells-preview">${cellDots}</div>
        <span>${correct?'✅':'❌'}</span>`;
    } catch(e) {
      row.innerHTML = `<span class="gname">${val}</span><span>❌</span>`;
    }
  } else if(skip) {
    row.innerHTML = `<span class="gname" style="color:var(--text2)">⏭️ Übersprungen</span><span>❌</span>`;
  } else {
    row.innerHTML = `<span class="gname" style="color:var(--text2)">❓ ${val} (unbekannt)</span><span>❌</span>`;
  }

  document.getElementById('gList').appendChild(row);
  guesses.push(val);
  input.value='';
  document.getElementById('ac').classList.remove('show');

  if(correct) { revealAll(); endGame(true); return; }
  if(guesses.length >= 6) { revealAll(); endGame(false); }
}

function skipGuess() { submitGuess(true); }

function revealAll() {
  for(let i=0;i<6;i++) document.getElementById('c'+i).classList.add('revealed');
}

function endGame(win) {
  gameOver=true;
  document.getElementById('inputWrap').style.display='none';
  document.getElementById('gBtn').style.display='none';
  document.getElementById('sBtn').style.display='none';
  const r=document.getElementById('result');
  r.style.display='block';
  r.className='result '+(win?'win':'lose');
  r.innerHTML = win
    ? `<h2>🎉 Richtig!</h2><img src="${flagUrl(answer.code,160)}" alt="${answer.name}"/><p>Du hast <strong>${answer.name}</strong> in ${guesses.length} Versuch${guesses.length===1?'':'en'} erraten!</p>`
    : `<h2>😢 Verloren!</h2><img src="${flagUrl(answer.code,160)}" alt="${answer.name}"/><p>Es war <strong>${answer.name}</strong>.</p>`;
  document.getElementById('paBtn').style.display='inline-block';
}

function onInput() {
  const val=document.getElementById('gInput').value.toLowerCase();
  const ac=document.getElementById('ac');
  if(!val){ac.classList.remove('show');return;}
  const matches=countries.filter(c=>c.name.toLowerCase().includes(val)).slice(0,7);
  if(!matches.length){ac.classList.remove('show');return;}
  ac.innerHTML=matches.map(c=>`
    <div class="ac-item" onclick="selectCountry('${c.name}')">
      <img src="${flagUrl(c.code,80)}" alt="${c.name}"/>
      ${c.name}
    </div>`).join('');
  ac.classList.add('show');
}

function selectCountry(name){
  document.getElementById('gInput').value=name;
  document.getElementById('ac').classList.remove('show');
}
function onKey(e){if(e.key==='Enter') submitGuess();}
document.addEventListener('click',e=>{
  if(!e.target.closest('.input-wrap')) document.getElementById('ac').classList.remove('show');
});

newGame();
</script>
</body>
</html>
